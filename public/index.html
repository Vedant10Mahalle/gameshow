<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generation Gala - Game Show Control System">
    <meta name="theme-color" content="#1a1a2e">

    <title>Generation Gala - Control System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="index-page">

    <!-- ================= HEADER ================= -->

    <header class="global-header" role="banner">

        <img src="user_logo_left.png" alt="Left Logo" class="brand-logo">
        <img src="user_logo_right.png" alt="Right Logo" class="brand-logo">

    </header>


    <!-- ================= EVENT TITLE ================= -->

    <div class="gala-title-container">

        <h1 class="gala-title">
            GENERATION GALA
        </h1>

    </div>


    <!-- ================= MAIN CONTAINER ================= -->

    <div class="index-container">

        <h2 class="main-title">
            Control System
        </h2>

        <p class="subtitle-text">
            Select a module to begin
        </p>


        <!-- ===== CONTROL BUTTONS ===== -->

        <nav class="button-grid" role="navigation" aria-label="Game Control Modules">

            <!-- FACE OFF HOST CONTROL -->
            <a href="host-foff.html" class="control-button foff-btn" title="Open Face Off Host Control Panel">

                <span class="button-icon" aria-hidden="true">🎯</span>
                <span class="button-text">Face Off Host</span>

            </a>


            <!-- FAST MONEY HOST CONTROL -->
            <a href="host-fm.html" class="control-button fm-btn" title="Open Fast Money Host Control Panel">

                <span class="button-icon" aria-hidden="true">💰</span>
                <span class="button-text">Fast Money Host</span>

            </a>


            <!-- FACE OFF DISPLAY SCREEN -->
            <a href="display.html" class="control-button display-btn" title="Open Face Off Display Screen">

                <span class="button-icon" aria-hidden="true">📺</span>
                <span class="button-text">Face Off Display</span>

            </a>


            <!-- FAST MONEY DISPLAY SCREEN -->
            <a href="display-fm.html" class="control-button display-fm-btn" title="Open Fast Money Display Screen">

                <span class="button-icon" aria-hidden="true">📺</span>
                <span class="button-text">Fast Money Display</span>

            </a>

        </nav>

    </div>


    <!-- ================= SCRIPTS ================= -->

    <script>

        /* =====================================================
        PAGE INITIALIZATION
        ===================================================== */

        document.addEventListener("DOMContentLoaded", () => {

            console.log("Generation Gala Control System Loaded");

            /* Initialize button interactions */
            initializeButtons();

        });


        /* =====================================================
        BUTTON INITIALIZATION
        ===================================================== */

        function initializeButtons() {

            const buttons = document.querySelectorAll(".control-button");

            if (!buttons.length) {
                console.warn("No control buttons found");
                return;
            }

            buttons.forEach(btn => {

                /* Mouse events */
                btn.addEventListener("mouseenter", () => {
                    btn.classList.add("btn-hover");
                });

                btn.addEventListener("mouseleave", () => {
                    btn.classList.remove("btn-hover");
                });

                /* Keyboard focus events */
                btn.addEventListener("focus", () => {
                    btn.classList.add("btn-focus");
                });

                btn.addEventListener("blur", () => {
                    btn.classList.remove("btn-focus");
                });

                /* Click event with visual feedback */
                btn.addEventListener("click", (e) => {
                    console.log("Navigation to:", btn.href);
                    btn.classList.add("btn-active");
                });

            });

        }


        /* =====================================================
        UTILITY FUNCTIONS
        ===================================================== */

        /* Check system connectivity */
        function checkSystemStatus() {

            if (navigator.onLine) {
                console.log("System online");
            } else {
                console.warn("System appears to be offline");
            }

        }

        /* Run checks on load */
        window.addEventListener("load", () => {
            checkSystemStatus();
        });

    </script>

</body>

</html>
