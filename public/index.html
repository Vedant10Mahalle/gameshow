<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Generation Gala Control System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="index-page">

    <!-- CORNER LOGOS -->
    <header class="global-header">

        <img src="user_logo_left.png" alt="Logo Left" class="brand-logo">

        <img src="user_logo_right.png" alt="Logo Right" class="brand-logo">

    </header>


    <!-- CENTER TITLE -->
    <div class="gala-title-container">

        <h2 class="gala-title">GENERATION GALA</h2>

    </div>


    <div class="index-container">

        <div class="stars"></div>

        <div class="neon-glow"></div>


        <h1 class="main-title">Generation Gala Control System</h1>

        <div class="subtitle-text">
            Generation Gala
        </div>


        <div class="button-grid">

            <a href="host-foff.html" class="control-button foff-btn">

                <div class="button-icon">🎯</div>

                <div class="button-text">Face Off Round</div>

                <div class="button-description">FOFF</div>

            </a>


            <a href="host-fm.html" class="control-button fm-btn">

                <div class="button-icon">💰</div>

                <div class="button-text">Fast Money Round</div>

                <div class="button-description">FM</div>

            </a>


            <a href="display.html" class="control-button display-btn">

                <div class="button-icon">📺</div>

                <div class="button-text">Face Off Display</div>

                <div class="button-description">FOFF AUDIENCE</div>

            </a>


            <a href="display-fm.html" class="control-button display-fm-btn">

                <div class="button-icon">📺</div>

                <div class="button-text">Fast Money Display</div>

                <div class="button-description">FM AUDIENCE</div>

            </a>

        </div>


        <div class="footer-credit">

            <p>Welcome to the Generation Gala</p>


        </div>

    </div>


   <style>

/* =====================================
RESET
===================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* =====================================
INDEX PAGE BACKGROUND
===================================== */

.index-page{

background:linear-gradient(
135deg,
#0a0015 0%,
#1a0033 50%,
#0a0015 100%
);

min-height:100vh;

position:relative;

display:flex;
flex-direction:column;
align-items:center;

}

/* =====================================
STAR EFFECT
===================================== */

.stars{

position:absolute;
width:100%;
height:100%;

top:0;
left:0;

pointer-events:none;

}

.stars::before{

content:'';

position:absolute;

width:3px;
height:3px;

background:white;

border-radius:50%;

top:20%;
left:10%;

opacity:0.8;

animation:twinkle 3s infinite;

}

@keyframes twinkle{

0%,100%{opacity:0.3;}
50%{opacity:1;}

}

/* =====================================
MAIN CONTAINER
===================================== */

.index-container{

position:relative;

z-index:10;

width:100%;
max-width:1200px;

display:flex;
flex-direction:column;
align-items:center;

padding-top:120px;
padding-bottom:200px;

}

/* =====================================
NEON GLOW
===================================== */

.neon-glow{

position:absolute;

top:-50px;
left:50%;

transform:translateX(-50%);

width:700px;
height:400px;

background:radial-gradient(
ellipse at center,
rgba(255,215,0,0.15) 0%,
transparent 70%
);

filter:blur(60px);

pointer-events:none;

}

/* =====================================
MAIN TITLE
===================================== */

.main-title{

font-size:4.5rem;

font-weight:900;

text-align:center;

margin-bottom:10px;

color:#ffd700;

letter-spacing:4px;

text-shadow:
0 0 30px rgba(255,215,0,0.9),
0 0 60px rgba(255,215,0,0.4),
2px 2px 8px rgba(0,0,0,0.8);

animation:titleGlow 3s ease-in-out infinite;

}

@keyframes titleGlow{

0%,100%{

text-shadow:
0 0 30px rgba(255,215,0,0.9),
0 0 60px rgba(255,215,0,0.4),
2px 2px 8px rgba(0,0,0,0.8);

}

50%{

text-shadow:
0 0 50px rgba(255,215,0,1),
0 0 100px rgba(255,215,0,0.7),
2px 2px 8px rgba(0,0,0,0.8);

}

}

/* =====================================
SUBTITLE
===================================== */

.subtitle-text{

font-size:1.8rem;

color:#ff69b4;

margin-bottom:60px;

font-weight:bold;

letter-spacing:2px;

text-shadow:0 0 15px rgba(255,105,180,0.7);

}

/* =====================================
BUTTON GRID
===================================== */

.button-grid{

display:grid;

grid-template-columns:repeat(2,320px);

gap:40px;

justify-content:center;

margin-top:20px;

}

/* =====================================
CONTROL BUTTON
===================================== */

.control-button{

text-decoration:none;

display:flex;

flex-direction:column;

align-items:center;
justify-content:center;

padding:45px 30px;

border-radius:18px;

font-weight:bold;

font-size:1.2rem;

border:2px solid;

transition:all 0.3s ease;

cursor:pointer;

color:white;

position:relative;

}

.control-button:hover{

transform:translateY(-8px) scale(1.05);

}

/* =====================================
BUTTON ICON
===================================== */

.button-icon{

font-size:3.2rem;

margin-bottom:12px;

}

/* =====================================
BUTTON TEXT
===================================== */

.button-text{

font-size:1.5rem;

margin-bottom:6px;

}

.button-description{

font-size:0.9rem;

opacity:0.9;

letter-spacing:1px;

}

/* =====================================
BUTTON COLORS
===================================== */

.foff-btn{
background:linear-gradient(135deg,#ff1744,#c41c3b);
border-color:#ff5252;
}

.fm-btn{
background:linear-gradient(135deg,#00e676,#00c853);
border-color:#1de9b6;
}

.display-btn{
background:linear-gradient(135deg,#2979f0,#1565c0);
border-color:#42a5f5;
}

.display-fm-btn{
background:linear-gradient(135deg,#9c27b0,#7b1fa2);
border-color:#ba68c8;
}

/* =====================================
FOOTER TEXT
===================================== */

.footer-credit{

text-align:center;

color:#bbb;

font-size:1rem;

margin-top:60px;

}

.footer-credit p{

margin:5px 0;

}

</style>


    <footer class="global-footer">

        <div class="vsm-branding">

            Made with <span class="heart-icon">❤️</span>
            by VSM Generation Gala ● All Rights Reserved

        </div>

    </footer>

</body>

</html>
