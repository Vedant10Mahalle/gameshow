<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Game Show Display - Audience Screen</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

</head>

<body>

    <!-- STRIKE OVERLAY -->
    <div id="massiveStrikeOverlay" class="massive-strike" style="display:none;">
        ✕
    </div>

    <!-- HEADER -->
    <header class="global-header">

        <img src="user_logo_left.png" alt="Left Logo" class="brand-logo">

        <img src="user_logo_right.png" alt="Right Logo" class="brand-logo">

    </header>

    <!-- TITLE -->
    <div class="gala-title-container">
        <h2 class="gala-title">GENERATION GALA</h2>
    </div>

    <!-- MAIN DISPLAY -->
    <div class="display-container">

        <!-- THANK YOU SCREEN -->
        <div id="thankYouScreen" class="thank-you-screen" style="display:none;">

            <div class="thank-you-content">

                <h1 class="thank-you-title">THANK YOU</h1>

                <h2 class="thank-you-subtitle">FOR PARTICIPATING</h2>

                <p class="thank-you-event">Generation Gala</p>

            </div>

            <div class="confetti"></div>

        </div>

        <!-- CHANCE OVERLAY -->
        <div id="chanceOverlay" class="chance-overlay" style="display:none;">

            <div class="chance-content">

                <h1 id="chanceMessageText" class="chance-title">
                    CHANCE TO TEAM
                </h1>

            </div>

        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" class="game-screen">

            <!-- ROUND TITLE -->
            <div class="header-title" id="roundTitle">
                FACE OFF
            </div>

            <!-- SCOREBOARD -->
            <div class="scoreboard">

                <!-- TEAM A -->
                <div class="score-team team-a">

                    <div class="team-name" id="teamAName">
                        Team A
                    </div>

                    <div class="team-score" id="teamAScore">
                        0
                    </div>

                    <div class="strikes">

                        <span id="strikesA">

                            <span class="strike empty">○</span>
                            <span class="strike empty">○</span>
                            <span class="strike empty">○</span>

                        </span>

                    </div>

                </div>

                <!-- TIMER CENTER -->
                <div class="scoreboard-center">

                    <div id="timerDisplay" class="timer-display" style="display:none;">
                        00:00
                    </div>

                </div>

                <!-- TEAM B -->
                <div class="score-team team-b">

                    <div class="team-name" id="teamBName">
                        Team B
                    </div>

                    <div class="team-score" id="teamBScore">
                        0
                    </div>

                    <div class="strikes">

                        <span id="strikesB">

                            <span class="strike empty">○</span>
                            <span class="strike empty">○</span>
                            <span class="strike empty">○</span>

                        </span>

                    </div>

                </div>

            </div>

            <!-- QUESTION DISPLAY -->
            <div class="question-container">

                <div id="audienceQuestionDisplay" class="question-inline-display" style="display:none;">

                    <h3 id="questionText">
                        Loading Question...
                    </h3>

                </div>

            </div>

            <!-- ANSWER BOARD -->
            <div class="answer-board">

                <div id="answerBoard" class="board-grid">

                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>

                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>

                </div>

            </div>

            <!-- BUZZER AUDIO -->
            <audio id="buzzerSound" preload="auto">
                <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA=="
                    type="audio/wav">
            </audio>

        </div>

    </div>

    <script src="display.js?v=8"></script>

</body>

</html>
