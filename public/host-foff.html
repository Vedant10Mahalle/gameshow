<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FOFF Host Control - Game Show</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="global-header">

        <img src="user_logo_left.png" alt="Left Logo" class="brand-logo">
        <img src="user_logo_right.png" alt="Right Logo" class="brand-logo">

    </header>


    <!-- ================= EVENT TITLE ================= -->

    <div class="gala-title-container">

        <h2 class="gala-title">GENERATION GALA</h2>

    </div>


    <!-- ================= MAIN HOST CONTAINER ================= -->

    <div class="host-container">


        <!-- ===== PAGE HEADER ===== -->

        <div class="host-header">

            <h1 class="host-title">FACE OFF HOST CONTROL</h1>

            <div class="header-buttons">

                <a href="index.html" class="btn btn-secondary">
                    ← Back to Menu
                </a>

            </div>

        </div>


        <!-- ===== MAIN LAYOUT ===== -->

        <div class="host-content">


            <!-- =====================================================
LEFT CONTROL PANEL
===================================================== -->

            <div class="control-panel">


                <!-- ROUND SELECTOR -->

                <div class="control-section">

                    <h3>Round Selection</h3>

                    <label for="roundSelector">Select Round</label>

                    <select id="roundSelector" class="input-field" onchange="loadRound()">

                        <option value="">Select Round</option>
                        <option value="round0">Round 0 (Elimination)</option>
                        <option value="round1">Sub Round 1</option>
                        <option value="round2">Sub Round 2</option>

                    </select>

                </div>


                <!-- TEAM MANAGEMENT -->

                <div class="control-section">

                    <h3>Team Names</h3>

                    <label for="teamA">Team A</label>

                    <input id="teamA" type="text" class="input-field" value="Team A" placeholder="Team A Name">

                    <label for="teamB">Team B</label>

                    <input id="teamB" type="text" class="input-field" value="Team B" placeholder="Team B Name">

                    <div class="button-row">

                        <button class="btn btn-primary" onclick="updateTeams()">
                            Update Teams
                        </button>

                        <button class="btn btn-secondary" onclick="resetGame()">
                            Reset Game
                        </button>

                    </div>

                </div>


                <!-- SCORE CONTROL -->

                <div class="control-section">

                    <h3>Score Control</h3>

                    <div id="qualifyMessage" class="qualify-message"></div>

                    <label for="pointsInput">Points</label>

                    <input id="pointsInput" type="number" class="input-field" value="0" placeholder="Points">

                    <div class="button-row">

                        <button class="btn btn-success" onclick="addScore('A')">
                            + A
                        </button>

                        <button class="btn btn-success" onclick="addScore('B')">
                            + B
                        </button>

                    </div>

                    <div class="button-row">

                        <button class="btn btn-danger" onclick="deductScore('A')">
                            - A
                        </button>

                        <button class="btn btn-danger" onclick="deductScore('B')">
                            - B
                        </button>

                    </div>

                </div>


                <!-- STRIKE SYSTEM -->

                <div class="control-section">

                    <h3>Strikes</h3>

                    <div class="button-row">

                        <button class="btn btn-strike" onclick="addStrike('A')">
                            Strike A ❌
                        </button>

                        <button class="btn btn-strike" onclick="addStrike('B')">
                            Strike B ❌
                        </button>

                    </div>

                    <div class="button-row">

                        <button class="btn btn-secondary" onclick="resetStrikes()">
                            Reset Strikes
                        </button>

                    </div>

                </div>


                <!-- QUESTION NAVIGATION -->

                <div class="control-section">

                    <h3>Question Navigation</h3>

                    <div class="button-row">

                        <button class="btn btn-secondary" onclick="previousQuestion()">
                            ← Previous
                        </button>

                        <button class="btn btn-secondary" onclick="nextQuestion()">
                            Next →
                        </button>

                    </div>

                </div>


            </div>


            <!-- =====================================================
RIGHT PANEL
===================================================== -->

            <div class="answer-panel">


                <!-- QUESTION DISPLAY -->

                <div class="question-display">

                    <h2 class="question-heading">Question</h2>

                    <div id="questionText" class="question-text">
                        Load a round to start...
                    </div>

                </div>


                <!-- ANSWERS PANEL -->

                <div class="answers-container">

                    <h3>Answers</h3>

                    <div id="answersList" class="answers-list">

                        <p>Select a round to display answers</p>

                    </div>

                </div>


            </div>


        </div>

    </div>


    <!-- ================= SCRIPTS ================= -->

    <script src="host-foff.js?v=7"></script>


</body>

</html>
