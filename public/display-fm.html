<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FM Display - Game Show</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =============================
MAIN CONTAINER
============================= */

        .fm-container {
            width: 100%;
            max-width: 1700px;
            margin: auto;
            padding: 40px 80px;
        }

        /* =============================
HEADER
============================= */

        .global-header {
            position: sticky;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.3), transparent);
            z-index: 1000;
        }

        .brand-logo {
            width: 200px;
            height: 200px;
            object-fit: contain;
            filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.7));
        }

        /* =============================
TITLE
============================= */

        .gala-title-container {
            text-align: center;
            margin-top: 30px;
        }

        .gala-title {

            font-size: 4rem;

            letter-spacing: 14px;

            font-weight: 900;

            color: #ffd700;

            text-shadow: 0 0 35px rgba(255, 215, 0, 0.8);

        }

        /* =============================
ROUND TITLE
============================= */

        .round-title {

            font-size: 6rem;

            font-weight: 900;

            letter-spacing: 6px;

            text-align: center;

            color: #ffd700;

            margin-bottom: 50px;

            text-shadow: 0 0 40px rgba(255, 215, 0, 0.8);

        }

        /* =============================
QUESTION DISPLAY
============================= */

        .fm-question-display {

            width: 100%;
            max-width: 1300px;

            margin: 40px auto;

            padding: 60px;

            border-radius: 22px;

            background: linear-gradient(135deg,
                    rgba(255, 215, 0, 0.25),
                    rgba(255, 215, 0, 0.05));

            border: 4px solid #ffd700;

            text-align: center;

            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);

        }

        .fm-question-label {

            font-size: 2.4rem;

            font-weight: 800;

            color: #ffd700;

            letter-spacing: 4px;

            margin-bottom: 15px;

        }

        .fm-question-text {

            font-size: 5rem;

            font-weight: 900;

            line-height: 1.25;

            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);

        }

        /* =============================
TIMER
============================= */

        .timer-section {

            border: 4px solid #ffd700;

            border-radius: 30px;

            padding: 70px 140px;

            text-align: center;

            margin-bottom: 50px;

            background: rgba(0, 0, 0, 0.5);

        }

        .timer-label {

            font-size: 2.6rem;

            color: #ffd700;

            margin-bottom: 20px;

            font-weight: 800;

        }

        .timer-display {

            font-size: 12rem;

            font-weight: 900;

            color: #ffd700;

            font-family: 'Courier New', monospace;

            text-shadow: 0 0 40px rgba(255, 215, 0, 0.9);

        }

        /* =============================
SCOREBOARD
============================= */

        .scoreboard {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 60px;

            width: 100%;

            margin-top: 40px;

        }

        .team-box {

            border: 3px solid;

            border-radius: 22px;

            padding: 45px 35px;

            text-align: center;

            background: rgba(0, 0, 0, 0.45);

        }

        .team-a {
            border-color: #ff6b6b;
        }

        .team-b {
            border-color: #4ecdc4;
        }

        .team-name {

            font-size: 3.2rem;

            font-weight: 900;

            margin-bottom: 20px;

            letter-spacing: 4px;

        }

        .team-a .team-name {
            color: #ff6b6b;
        }

        .team-b .team-name {
            color: #4ecdc4;
        }

        .score {

            font-size: 3.8rem;

            font-weight: 900;

            color: white;

            margin-bottom: 20px;

        }

        /* PLAYER SCORES */

        .player-scores {

            font-size: 2rem;

            font-weight: 700;

            display: flex;
            flex-direction: column;
            gap: 10px;

        }

        /* =============================
ANSWER BOARD
============================= */

        .answer-board {

            display: flex;
            justify-content: center;

            width: 100%;

            margin-top: 50px;

        }

        .board-grid {

            display: grid;

            grid-template-columns: repeat(2, minmax(420px, 1fr));

            gap: 35px;

            width: 100%;
            max-width: 1200px;

        }

        .answer-box {

            min-height: 130px;

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 25px 40px;

            font-size: 2.4rem;

            font-weight: 800;

            border-radius: 14px;

            border: 2px solid rgba(255, 255, 255, 0.25);

            color: white;

            background: rgba(255, 255, 255, 0.08);

        }

        .answer-box.placeholder {

            justify-content: center;

            font-size: 4rem;

            border-style: dashed;

        }

        /* =============================
STRIKE OVERLAY
============================= */

        .massive-strike {

            position: fixed;

            top: 0;
            left: 0;

            width: 100vw;
            height: 100vh;

            background: rgba(255, 0, 0, 0.25);

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 35rem;

            color: #ff1744;

            text-shadow: 0 0 100px #ff1744;

            z-index: 9999;

        }

        /* =============================
FOOTER
============================= */

        .global-footer {
            position: relative;
            width: 100%;
            padding: 40px;
            display: flex;
            justify-content: center;
            margin-top: 60px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.4), transparent);
        }

        .vsm-branding {
            font-size: 1.6rem;
            letter-spacing: 4px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.7), 0 0 40px rgba(255, 215, 0, 0.6);
        }

        /* =====================================
   DISPLAY-FM — RESPONSIVE
===================================== */

        @media(max-width:1024px) {
            .global-header {
                position: relative;
                padding: 20px 30px;
            }

            .brand-logo {
                width: 90px;
                height: 90px;
            }

            .gala-title {
                font-size: 2.4rem;
                letter-spacing: 6px;
            }

            .fm-container {
                padding: 30px;
            }

            .round-title {
                font-size: 3.5rem;
            }

            .fm-question-display {
                padding: 35px;
            }

            .fm-question-text {
                font-size: 3rem;
            }

            .timer-section {
                padding: 40px 60px;
            }

            .timer-display {
                font-size: 7rem;
            }

            .scoreboard {
                gap: 30px;
            }

            .board-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .vsm-branding {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            .global-footer {
                padding: 25px;
                margin-top: 30px;
            }
        }

        @media(max-width:768px) {
            .global-header {
                position: relative;
                padding: 15px 15px;
            }

            .brand-logo {
                width: 60px;
                height: 60px;
            }

            .gala-title {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }

            .fm-container {
                padding: 20px 15px;
            }

            .round-title {
                font-size: 2.4rem;
                margin-bottom: 15px;
            }

            .fm-question-display {
                padding: 20px;
                border-radius: 16px;
                border-width: 3px;
            }

            .fm-question-label {
                font-size: 1.4rem;
            }

            .fm-question-text {
                font-size: 2rem;
            }

            .timer-section {
                padding: 25px 30px;
                border-radius: 18px;
            }

            .timer-label {
                font-size: 1.6rem;
            }

            .timer-display {
                font-size: 4.5rem;
            }

            .scoreboard {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .team-box {
                padding: 22px;
                border-radius: 16px;
            }

            .team-name {
                font-size: 2rem;
            }

            .score {
                font-size: 3rem;
            }

            .player-scores {
                font-size: 1.5rem;
            }

            .board-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .answer-box {
                min-height: 65px;
                padding: 16px 18px;
                font-size: 1.5rem;
            }

            .answer-box.placeholder {
                font-size: 2rem;
            }

            .vsm-branding {
                font-size: 0.9rem;
                letter-spacing: 1px;
            }

            .global-footer {
                padding: 15px;
                margin-top: 20px;
            }

            .massive-strike {
                font-size: 12rem;
            }
        }

        @media(max-width:480px) {
            .global-header {
                padding: 10px 10px;
            }

            .brand-logo {
                width: 45px;
                height: 45px;
            }

            .gala-title {
                font-size: 1.35rem;
                letter-spacing: 3px;
            }

            .fm-container {
                padding: 15px 10px;
            }

            .round-title {
                font-size: 1.8rem;
                margin-bottom: 12px;
            }

            .fm-question-display {
                padding: 15px;
                border-radius: 12px;
            }

            .fm-question-label {
                font-size: 1.1rem;
            }

            .fm-question-text {
                font-size: 1.6rem;
            }

            .timer-section {
                padding: 18px 20px;
                border-radius: 14px;
            }

            .timer-label {
                font-size: 1.2rem;
            }

            .timer-display {
                font-size: 3.5rem;
            }

            .scoreboard {
                gap: 10px;
            }

            .team-box {
                padding: 16px;
                border-radius: 12px;
            }

            .team-name {
                font-size: 1.6rem;
            }

            .score {
                font-size: 2.4rem;
            }

            .player-scores {
                font-size: 1.25rem;
            }

            .board-grid {
                gap: 8px;
            }

            .answer-box {
                min-height: 50px;
                padding: 12px 14px;
                font-size: 1.3rem;
            }

            .answer-box.placeholder {
                font-size: 1.6rem;
            }

            .vsm-branding {
                font-size: 0.8rem;
                letter-spacing: 1px;
            }

            .global-footer {
                padding: 12px;
                margin-top: 15px;
            }

            .massive-strike {
                font-size: 8rem;
            }
        }
    </style>

</head>

<body>

    <div id="massiveStrikeOverlay" class="massive-strike" style="display:none;">✕</div>

    <header class="global-header">
        <img src="user_logo_left.png" class="brand-logo">
        <img src="user_logo_right.png" class="brand-logo">
    </header>

    <div class="gala-title-container">
        <h2 class="gala-title">GENERATION GALA</h2>
    </div>

    <div class="fm-container">

        <h1 class="round-title">FAST MONEY</h1>

        <div class="fm-content">

            <div class="timer-section">
                <div class="timer-label">TIME REMAINING</div>
                <div class="timer-display" id="timerDisplay">00:00</div>
            </div>

            <!-- SCOREBOARD -->

            <div class="scoreboard">

                <div class="team-box team-a">

                    <div class="team-name" id="teamAName">Team A</div>

                    <div class="score" id="teamAScore">0</div>

                    <div class="player-scores">
                        <div><span id="playerA1Name">Player 1</span>: <span id="scoreA1">0</span></div>
                        <div><span id="playerA2Name">Player 2</span>: <span id="scoreA2">0</span></div>
                    </div>

                </div>

                <div class="team-box team-b">

                    <div class="team-name" id="teamBName">Team B</div>

                    <div class="score" id="teamBScore">0</div>

                    <div class="player-scores">
                        <div><span id="playerB1Name">Player 1</span>: <span id="scoreB1">0</span></div>
                        <div><span id="playerB2Name">Player 2</span>: <span id="scoreB2">0</span></div>
                    </div>

                </div>

            </div>
            <!-- QUESTION -->

            <div id="questionDisplay" class="fm-question-display" style="display:none;">

                <div class="fm-question-label">
                    QUESTION
                </div>

                <div id="fmQuestionText" class="fm-question-text"></div>

            </div>
            <div class="answer-board">

                <div id="answerBoard" class="board-grid">

                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER HIDDEN
    <footer class="global-footer">
        <div class="vsm-branding">
            Made with ❤️ by VSM Generation Gala ● All Rights Reserved
        </div>
    </footer>
    -->

    <script>

        const socket = io();

        socket.on("broadcastCurrentQuestion", (questionData) => {

            const qBox = document.getElementById("questionDisplay");
            const qText = document.getElementById("fmQuestionText");

            if (!qBox || !qText) return;

            if (questionData && questionData.question) {

                qText.textContent = questionData.question;

                qBox.style.display = "block";

            }

        });

        socket.on("stateUpdate", (state) => {

            const qBox = document.getElementById("questionDisplay");
            const qText = document.getElementById("fmQuestionText");

            if (state.currentQuestion && state.currentQuestion.question) {

                qText.textContent = state.currentQuestion.question;

                qBox.style.display = "block";

            }

        });

        socket.on("timerUpdate", (seconds) => {

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;

            document.getElementById("timerDisplay").textContent =
                `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

        });

    </script>

</body>

</html>
