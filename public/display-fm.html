<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FM Display - Game Show</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>

body{
font-family:'Outfit',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
}

/* =============================
MAIN CONTAINER
============================= */

.fm-container{
width:100%;
max-width:1700px;
margin:auto;

/* pushes content below header */
padding-top:260px;

/* prevents footer overlap */
padding-bottom:240px;

padding-left:80px;
padding-right:80px;
}

/* =============================
HEADER
============================= */

.global-header{

position:fixed;

top:30px;
left:0;
width:100%;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 120px;

z-index:1000;

}

/* LOGOS */

.brand-logo{

width:220px;
height:220px;

object-fit:contain;

filter:drop-shadow(0 0 35px rgba(255,215,0,0.7));

}

/* =============================
TITLE
============================= */

.gala-title-container{
text-align:center;
margin-top:30px;
}

.gala-title{

font-size:4rem;

letter-spacing:14px;

font-weight:900;

color:#ffd700;

text-shadow:0 0 35px rgba(255,215,0,0.8);

}

/* =============================
ROUND TITLE
============================= */

.round-title{

font-size:6rem;

font-weight:900;

letter-spacing:6px;

text-align:center;

color:#ffd700;

margin-bottom:50px;

text-shadow:0 0 40px rgba(255,215,0,0.8);

}

/* =============================
QUESTION DISPLAY
============================= */

.fm-question-display{

width:100%;
max-width:1300px;

margin:40px auto;

padding:60px;

border-radius:22px;

background:linear-gradient(
135deg,
rgba(255,215,0,0.25),
rgba(255,215,0,0.05)
);

border:4px solid #ffd700;

text-align:center;

box-shadow:0 0 50px rgba(255,215,0,0.5);

}

.fm-question-label{

font-size:2.4rem;

font-weight:800;

color:#ffd700;

letter-spacing:4px;

margin-bottom:15px;

}

.fm-question-text{

font-size:5rem;

font-weight:900;

line-height:1.25;

text-shadow:0 0 20px rgba(255,255,255,0.6);

}

/* =============================
TIMER
============================= */

.timer-section{

border:4px solid #ffd700;

border-radius:30px;

padding:70px 140px;

text-align:center;

margin-bottom:50px;

background:rgba(0,0,0,0.5);

}

.timer-label{

font-size:2.6rem;

color:#ffd700;

margin-bottom:20px;

font-weight:800;

}

.timer-display{

font-size:12rem;

font-weight:900;

color:#ffd700;

font-family:'Courier New',monospace;

text-shadow:0 0 40px rgba(255,215,0,0.9);

}

/* =============================
SCOREBOARD
============================= */

.scoreboard{

display:grid;

grid-template-columns:1fr 1fr;

gap:60px;

width:100%;

margin-top:40px;

}

.team-box{

border:3px solid;

border-radius:22px;

padding:45px 35px;

text-align:center;

background:rgba(0,0,0,0.45);

}

.team-a{
border-color:#ff6b6b;
}

.team-b{
border-color:#4ecdc4;
}

.team-name{

font-size:3.2rem;

font-weight:900;

margin-bottom:20px;

letter-spacing:4px;

}

.team-a .team-name{
color:#ff6b6b;
}

.team-b .team-name{
color:#4ecdc4;
}

.score{

font-size:3.8rem;

font-weight:900;

color:white;

margin-bottom:20px;

}

/* PLAYER SCORES */

.player-scores{

font-size:2rem;

font-weight:700;

display:flex;
flex-direction:column;
gap:10px;

}

/* =============================
ANSWER BOARD
============================= */

.answer-board{

display:flex;
justify-content:center;

width:100%;

margin-top:50px;

}

.board-grid{

display:grid;

grid-template-columns:repeat(2,minmax(420px,1fr));

gap:35px;

width:100%;
max-width:1200px;

}

.answer-box{

min-height:130px;

display:flex;
align-items:center;
justify-content:space-between;

padding:25px 40px;

font-size:2.4rem;

font-weight:800;

border-radius:14px;

border:2px solid rgba(255,255,255,0.25);

color:white;

background:rgba(255,255,255,0.08);

}

.answer-box.placeholder{

justify-content:center;

font-size:4rem;

border-style:dashed;

}

/* =============================
STRIKE OVERLAY
============================= */

.massive-strike{

position:fixed;

top:0;
left:0;

width:100vw;
height:100vh;

background:rgba(255,0,0,0.25);

display:flex;
align-items:center;
justify-content:center;

font-size:35rem;

color:#ff1744;

text-shadow:0 0 100px #ff1744;

z-index:9999;

}

/* =============================
FOOTER
============================= */

.global-footer{

position:fixed;

bottom:0;
left:0;

width:100%;

padding:40px;

display:flex;
justify-content:center;

background:linear-gradient(
to top,
rgba(0,0,0,0.9),
rgba(0,0,0,0.4),
transparent
);

}

.vsm-branding{

font-size:2.6rem;

letter-spacing:6px;

font-weight:800;

text-shadow:
0 0 20px rgba(255,255,255,0.7),
0 0 40px rgba(255,215,0,0.6);

}

</style>

</head>

<body>

    <div id="massiveStrikeOverlay" class="massive-strike" style="display:none;">✕</div>

    <header class="global-header">
        <img src="user_logo_left.png" class="brand-logo">
        <img src="user_logo_right.png" class="brand-logo">
    </header>

    <div class="gala-title-container">
        <h2 class="gala-title">GENERATION GALA</h2>
    </div>

    <div class="fm-container">

        <h1 class="round-title">FAST MONEY</h1>

        <div class="fm-content">

            <div class="timer-section">
                <div class="timer-label">TIME REMAINING</div>
                <div class="timer-display" id="timerDisplay">00:00</div>
            </div>

            <!-- SCOREBOARD -->

            <div class="scoreboard">

                <div class="team-box team-a">

                    <div class="team-name" id="teamAName">Team A</div>

                    <div class="score" id="teamAScore">0</div>

                    <div class="player-scores">
                        <div><span id="playerA1Name">Player 1</span>: <span id="scoreA1">0</span></div>
                        <div><span id="playerA2Name">Player 2</span>: <span id="scoreA2">0</span></div>
                    </div>

                </div>

                <div class="team-box team-b">

                    <div class="team-name" id="teamBName">Team B</div>

                    <div class="score" id="teamBScore">0</div>

                    <div class="player-scores">
                        <div><span id="playerB1Name">Player 1</span>: <span id="scoreB1">0</span></div>
                        <div><span id="playerB2Name">Player 2</span>: <span id="scoreB2">0</span></div>
                    </div>

                </div>

            </div>
            <!-- QUESTION -->

            <div id="questionDisplay" class="fm-question-display" style="display:none;">

                <div class="fm-question-label">
                    QUESTION
                </div>

                <div id="fmQuestionText" class="fm-question-text"></div>

            </div>
            <div class="answer-board">

                <div id="answerBoard" class="board-grid">

                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>
                    <div class="answer-box placeholder">?</div>

                </div>

            </div>

        </div>

    </div>

    <footer class="global-footer">
        <div class="vsm-branding">
            Made with ❤️ by VSM Generation Gala ● All Rights Reserved
        </div>
    </footer>

    <script>

        const socket = io();

        socket.on("broadcastCurrentQuestion", (questionData) => {

            const qBox = document.getElementById("questionDisplay");
            const qText = document.getElementById("fmQuestionText");

            if (!qBox || !qText) return;

            if (questionData && questionData.question) {

                qText.textContent = questionData.question;

                qBox.style.display = "block";

            }

        });

        socket.on("stateUpdate", (state) => {

            const qBox = document.getElementById("questionDisplay");
            const qText = document.getElementById("fmQuestionText");

            if (state.currentQuestion && state.currentQuestion.question) {

                qText.textContent = state.currentQuestion.question;

                qBox.style.display = "block";

            }

        });

        socket.on("timerUpdate", (seconds) => {

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;

            document.getElementById("timerDisplay").textContent =
                `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

        });

    </script>

</body>

</html>
