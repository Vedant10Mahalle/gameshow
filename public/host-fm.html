<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FM Host Control - Game Show</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="global-header">

        <img src="user_logo_left.png" alt="Left Logo" class="brand-logo">

        <img src="user_logo_right.png" alt="Right Logo" class="brand-logo">

    </header>


    <!-- ================= TITLE ================= -->

    <div class="gala-title-container">

        <h2 class="gala-title">GENERATION GALA</h2>

    </div>


    <!-- ================= MAIN CONTAINER ================= -->

    <div class="host-container">


        <!-- ===== PAGE HEADER ===== -->

        <div class="host-header">

            <h1 class="host-title">FAST MONEY HOST CONTROL</h1>

            <div class="header-buttons">

                <a href="index.html" class="btn btn-secondary">
                    ← Back to Menu
                </a>

            </div>

        </div>


        <!-- ===== MAIN LAYOUT ===== -->

        <div class="host-content">


            <!-- =====================================================
LEFT CONTROL PANEL
===================================================== -->

            <div class="control-panel">


                <!-- TEAM SETUP -->

                <div class="control-section">

                    <h3>Team Setup</h3>

                    <label for="teamA">Team Name</label>
                    <input id="teamA" type="text" class="input-field" value="Team A">

                    <label for="playerA1">Player 1</label>
                    <input id="playerA1" type="text" class="input-field" value="Player 1">

                    <label for="playerA2">Player 2</label>
                    <input id="playerA2" type="text" class="input-field" value="Player 2">

                    <button class="btn btn-primary" onclick="updatePlayers()">
                        Update Players
                    </button>

                </div>


                <!-- ACTIVE PLAYER -->

                <div class="control-section">

                    <h3>Active Player</h3>

                    <select id="activePlayerSelector" class="input-field" onchange="setActivePlayer()">

                        <option value="none">None (Hide Banner)</option>
                        <option value="A1">Player 1</option>
                        <option value="A2">Player 2</option>

                    </select>

                </div>


                <!-- SCORE MANAGEMENT -->

                <div class="control-section">

                    <h3>Scores (Target: 200)</h3>

                    <div class="score-display">

                        <div class="score-item">

                            <span class="score-label">Player 1</span>

                            <div id="scoreP1" class="score-value">0</div>

                        </div>

                        <div class="score-item">

                            <span class="score-label">Player 2</span>

                            <div id="scoreP2" class="score-value">0</div>

                        </div>

                    </div>


                    <div class="combined-score-display">

                        <span class="combined-label">COMBINED:</span>

                        <span id="scoreCombined" class="combined-value">0</span>

                        <span class="combined-target">/ 200</span>

                    </div>


                    <label for="pointsInput" class="small-label">
                        Points to add/deduct:
                    </label>

                    <input id="pointsInput" type="number" class="input-field" value="10" min="1">


                    <div class="button-row">

                        <button class="btn btn-success" onclick="addScore('A',0)">
                            + Player 1
                        </button>

                        <button class="btn btn-success" onclick="addScore('A',1)">
                            + Player 2
                        </button>

                    </div>


                    <div class="button-row">

                        <button class="btn btn-danger" onclick="deductScore(0)">
                            − Player 1
                        </button>

                        <button class="btn btn-danger" onclick="deductScore(1)">
                            − Player 2
                        </button>

                    </div>

                </div>


                <!-- TIMER -->

                <div class="control-section">

                    <h3>Timer (60 sec)</h3>

                    <div class="timer-display host-timer" id="timerDisplay">
                        00:00
                    </div>

                    <input id="timerInput" type="number" class="input-field" value="60" min="1" max="300">

                    <div class="button-row">

                        <button class="btn btn-primary" onclick="startTimer()">
                            Start Timer
                        </button>

                        <button class="btn btn-secondary" onclick="stopTimer()">
                            Pause
                        </button>

                        <button class="btn btn-secondary" onclick="resetTimer()">
                            Reset
                        </button>

                    </div>

                </div>


                <!-- END ROUND -->

                <div class="control-section">

                    <h3>🎬 End Round</h3>

                    <p class="section-note">Run at end of round:</p>

                    <div class="button-column">

                        <button class="btn btn-primary" onclick="showTeamScore('A')">
                            📊 Show Combined Score
                        </button>

                        <button class="btn btn-success" onclick="checkWin()">
                            🏆 Check if 200 Reached
                        </button>

                        <button class="btn btn-secondary" onclick="hideRevealScreen()">
                            ✕ Hide Reveal Screen
                        </button>

                        <button class="btn btn-end-game" onclick="showThankYou()">
                            🎉 Thank You Screen
                        </button>

                        <button class="btn btn-secondary" onclick="resetGame()">
                            🔄 Reset Game
                        </button>

                    </div>

                </div>


            </div>


            <!-- =====================================================
RIGHT PANEL
===================================================== -->

            <div class="answer-panel">


                <!-- QUESTION CONTROLS -->

                <div class="fm-controls">

                    <h3>Current Question</h3>

                    <select id="questionSelector" class="input-field" onchange="selectQuestion()">

                        <option value="">
                            Load a question...
                        </option>

                    </select>


                    <div class="button-row">

                        <button class="btn btn-secondary" onclick="prevQuestion()">
                            ⭠ Previous
                        </button>

                        <button class="btn btn-primary" onclick="nextQuestion()">
                            Next ⭢
                        </button>

                    </div>


                    <div class="button-row">

                        <button class="btn btn-secondary" onclick="clearBoard()">
                            🧹 Clear Board
                        </button>

                        <button class="btn btn-strike" onclick="markCross()">
                            ❌ Mark Pass / Cross
                        </button>

                    </div>

                </div>


                <!-- QUESTION DISPLAY -->

                <div class="question-display">

                    <div id="questionText" class="question-text">
                        Load a question to start...
                    </div>

                </div>


                <!-- ANSWERS -->

                <div class="answers-container">

                    <h3>Answers</h3>

                    <div id="answersList" class="answers-list">

                        <p>Select a question to display answers</p>

                    </div>

                </div>


            </div>


        </div>

    </div>


    <!-- ================= SCRIPTS ================= -->

    <script src="host-fm.js?v=9"></script>


</body>

</html>
